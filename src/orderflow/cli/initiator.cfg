# Deribit FIX API Configuration
# For Testnet - Use fix-test.deribit.com:9881
# For Production - Use fix.deribit.com:9880

[DEFAULT]
# Connection settings
ConnectionType=initiator
ReconnectInterval=30
FileStorePath=store
FileLogPath=log

# Session timing (00:00:00 to 00:00:00 means always connected)
StartTime=00:00:00
EndTime=00:00:00

# Data dictionary - Set to N to disable validation
UseDataDictionary=N

# Validation settings
ValidateUserDefinedFields=N
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateUnorderedGroupFields=N

# Logging - Enable detailed logging
FileLogPath=log
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y

[SESSION]
# FIX Protocol version
BeginString=FIX.4.4

# Your identifiers
SenderCompID=MYTRADER
TargetCompID=DERIBITSERVER

# Heartbeat interval (seconds)
HeartBtInt=30

# Deribit FIX Server - TESTNET
SocketConnectHost=fix-test.deribit.com
SocketConnectPort=9881

# For PRODUCTION, use:
# SocketConnectHost=fix.deribit.com
# SocketConnectPort=9880

# Session reset behavior
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y